name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per ref; a newer push cancels the in-progress one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Everything runs as steps in a single job: one runner start, one checkout.
# Far fewer billed job-minutes than the previous 7 separate jobs, and the work
# itself is only a few seconds per tool.
jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans full history

      - name: ShellCheck (shellcheck is preinstalled on the runner)
        run: shellcheck --severity=warning bin/herm $(git ls-files '*.sh')

      - name: markdownlint
        run: npx -y markdownlint-cli2 "**/*.md" "#node_modules"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pytest (skillpm)
        run: |
          pip install --quiet pytest
          PYTHONPATH=. pytest tests/skillpm -q

      - name: bats (cli)
        run: |
          npm install -g bats
          bats tests/cli

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: terraform fmt/validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3
      - name: tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
