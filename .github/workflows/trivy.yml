name: trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  iac:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
