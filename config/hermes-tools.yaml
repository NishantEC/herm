# herm — Hermes Agent toolset disable policy.
#
# Applied to /home/herm/.hermes/config.yaml on first boot by
# cloud-init/scripts/08-tool-allowlist.sh. The value gets merged into
# config["agent"]["disabled_toolsets"], which is Hermes Agent v0.13.0's
# real mechanism for opting a toolset out of the runtime.
#
# Hermes ships with 22+ toolsets. Running with all of them enabled on a VM
# that holds your GitHub/Anthropic OAuth tokens is more risk than the Linux
# user/process isolation alone warrants. The list below disables the
# toolsets we don't need for the v0.2 use case.
#
# To re-enable any of these, delete the entry and run `herm upgrade`.

disabled_toolsets:
  - browser-cdp       # full Chrome DevTools Protocol — too much surface
  - computer_use      # screen/mouse/keyboard control — extreme blast radius
  - discord           # external messaging — not wired in v0.2
  - email             # external messaging — not wired
  - godmode           # red-teaming skill — explicit opt-in only
  - mattermost        # external messaging
  - matrix            # external messaging
  - minecraft-modpack-server   # niche
  - pokemon-player    # niche
  # slack             # ENABLED — Socket Mode adapter via slack-bolt. Set
  #                   SLACK_BOT_TOKEN + SLACK_APP_TOKEN in ~/.hermes/.env.
  - telegram          # external messaging — not wired
  - whatsapp          # external messaging — not wired
  - tts               # text-to-speech — cost without value yet
  - voice             # voice toolset — cost without value
  - xurl              # generic HTTP — bypasses tool-specific allowlists
